# Per-repo caller — copy to <repo>/.github/workflows/wake-on-codex-review.yml
#
# Fill in: escalation_handle, required_checks_text. Requires the repo to have a
# `CEREMONY_PAT` secret (fine-grained PAT, pull-requests:write) — see
# docs/per-repo-wiring.md. Pin @v0.1.0 to a newer tag as it's released.
#
# The `permissions:` block is REQUIRED: a called (reusable) workflow cannot
# request more than the caller's token grants, and most repos default to a
# read-only token. Without this block the run fails at startup.
name: Wake Claude on Codex review

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  call:
    uses: WEDDEsign/agent-tooling/.github/workflows/wake-on-codex-review.yml@v0.1.0
    with:
      escalation_handle: '@WEDDEsign'
      required_checks_text: 'the required checks'   # e.g. '`Backend (pytest)`, `Frontend (tsc + build)`'
    secrets:
      CEREMONY_PAT: ${{ secrets.CEREMONY_PAT }}
