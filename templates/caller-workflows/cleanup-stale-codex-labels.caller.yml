# Per-repo caller — copy to <repo>/.github/workflows/cleanup-stale-codex-labels.yml
#
# No repo-specific values required. Uses the default GITHUB_TOKEN (no PAT).
# The `permissions:` block is REQUIRED (callers must grant what the reusable
# needs; default tokens are read-only).
name: Cleanup stale Codex autopilot labels

on:
  schedule:
    - cron: '0 3 * * *'   # daily 03:00 UTC
  workflow_dispatch: {}

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  call:
    uses: WEDDEsign/agent-tooling/.github/workflows/cleanup-stale-codex-labels.yml@v0.1.0
    with:
      stale_hours: 24
