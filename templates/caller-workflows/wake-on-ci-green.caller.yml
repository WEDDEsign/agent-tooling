# Per-repo caller — copy to <repo>/.github/workflows/wake-on-ci-green.yml
#
# Fill in TWO repo-specific lists:
#   1. `workflows:` under workflow_run — the NAMES of this repo's CI workflows
#      (the `name:` field of each, not the filename) whose completion should
#      trigger a green-check evaluation.
#   2. `required_checks` — a JSON array of the check-RUN names that must ALL be
#      success before re-pinging Codex (job names as they surface as checks).
#
# The `permissions:` block is REQUIRED (callers must grant what the reusable
# needs; default tokens are read-only). Requires a `CEREMONY_PAT` secret.
name: Wake Claude on CI green

on:
  workflow_run:
    workflows: [CI, E2E]            # <-- this repo's CI workflow names
    types: [completed]

permissions:
  pull-requests: write
  contents: read
  checks: read

jobs:
  call:
    uses: WEDDEsign/agent-tooling/.github/workflows/wake-on-ci-green.yml@v0.1.0
    with:
      # JSON array string. Names with spaces/parens are fine.
      required_checks: '["Backend (pytest)","Backend integration (Firestore emulator)","Frontend (tsc + build)"]'
      escalation_handle: '@WEDDEsign'
    secrets:
      CEREMONY_PAT: ${{ secrets.CEREMONY_PAT }}
